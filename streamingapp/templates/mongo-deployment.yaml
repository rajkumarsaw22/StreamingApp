{{- if .Values.mongo.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  labels:
    {{- include "streamingapp.labels" . | nindent 4 }}
    app.kubernetes.io/component: "mongo"
spec:
  replicas: {{ .Values.mongo.replicaCount }}
  selector:
    matchLabels:
      {{- include "streamingapp.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: "mongo"
  template:
    metadata:
      labels:
        {{- include "streamingapp.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: "mongo"
    spec:
      containers:
        - name: mongo
          image: {{ .Values.mongo.image | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: mongodb
              containerPort: {{ .Values.mongo.port }}
              protocol: TCP
          volumeMounts:
            - name: mongo-data
              mountPath: {{ .Values.mongo.storage.mountPath }}
      volumes:
        - name: mongo-data
          {{- if .Values.mongo.storage.enabled }}
          persistentVolumeClaim:
            claimName: mongo-pvc
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
