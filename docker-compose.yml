#
# Some environments have DNS issues resolving AWS hostnames via the default Docker
# embedded resolver (127.0.0.11). Use explicit DNS servers for services that
# must reach AWS (S3).
#
x-dns: &aws_dns
  dns:
    - 1.1.1.1
    - 8.8.8.8

services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db

  auth:
    <<: *aws_dns
    build:
      context: ./backend/authService
    env_file:
      - ./backend/authService/.env
    depends_on:
      - mongo
    environment:
      PORT: 3001
      MONGO_URI: mongodb://mongo:27017/${MONGO_DB:-streamingapp}
      JWT_SECRET: ${JWT_SECRET:-changeme}
      CLIENT_URLS: ${CLIENT_URLS:-http://localhost:3000}
      AWS_CDN_URL: ${AWS_CDN_URL:-}
    ports:
      - "${AUTH_PORT:-3001}:3001"

  streaming:
    <<: *aws_dns
    build:
      context: ./backend
      dockerfile: streamingService/Dockerfile
    env_file:
      - ./backend/streamingService/.env
    depends_on:
      - mongo
    environment:
      PORT: 3002
      MONGO_URI: mongodb://mongo:27017/${MONGO_DB:-streamingapp}
      JWT_SECRET: ${JWT_SECRET:-changeme}
      CLIENT_URLS: ${CLIENT_URLS:-http://localhost:3000}
      AWS_CDN_URL: ${AWS_CDN_URL:-}
      STREAMING_PUBLIC_URL: ${STREAMING_PUBLIC_URL:-http://localhost:3002}
    ports:
      - "${STREAMING_PORT:-3002}:3002"

  admin:
    <<: *aws_dns
    build:
      context: ./backend
      dockerfile: adminService/Dockerfile
    env_file:
      - ./backend/adminService/.env
    depends_on:
      - mongo
    environment:
      PORT: 3003
      MONGO_URI: mongodb://mongo:27017/${MONGO_DB:-streamingapp}
      JWT_SECRET: ${JWT_SECRET:-changeme}
      CLIENT_URLS: ${CLIENT_URLS:-http://localhost:3000}
      AWS_CDN_URL: ${AWS_CDN_URL:-}
    ports:
      - "${ADMIN_PORT:-3003}:3003"

  chat:
    build:
      context: ./backend
      dockerfile: chatService/Dockerfile
    depends_on:
      - mongo
    environment:
      PORT: 3004
      MONGO_URI: mongodb://mongo:27017/${MONGO_DB:-streamingapp}
      JWT_SECRET: ${JWT_SECRET:-changeme}
      CLIENT_URLS: ${CLIENT_URLS:-http://localhost:3000}
    ports:
      - "${CHAT_PORT:-3004}:3004"

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_AUTH_API_URL: ${REACT_APP_AUTH_API_URL:-http://localhost:3001/api}
        REACT_APP_STREAMING_API_URL: ${REACT_APP_STREAMING_API_URL:-http://localhost:3002/api}
        REACT_APP_STREAMING_PUBLIC_URL: ${REACT_APP_STREAMING_PUBLIC_URL:-http://localhost:3002}
        REACT_APP_ADMIN_API_URL: ${REACT_APP_ADMIN_API_URL:-http://localhost:3003/api/admin}
        REACT_APP_CHAT_API_URL: ${REACT_APP_CHAT_API_URL:-http://localhost:3004/api/chat}
        REACT_APP_CHAT_SOCKET_URL: ${REACT_APP_CHAT_SOCKET_URL:-http://localhost:3004}
    depends_on:
      - auth
      - streaming
      - admin
      - chat
    ports:
      - "3000:80"

volumes:
  mongo-data:
